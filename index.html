<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOCKS GAME</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
    <meta name="description" content="Blocks Game website"/>
    <meta name="keywords" content="thmrcode, project, code, programming">
    <meta name="author" content="ThMrCode">
</head>
<body>

    <header class="header">
        <div class="brand">
            <span class="logo arcade">BLOCKS</span>
            <span class="brand-tag">Plain JS · 2024</span>
        </div>
    </header>

    <main class="stage">
        <div class="panel">
            <!-- Intro + instructions -->
            <div class="intro-col">
                <h1 class="brand-title arcade">BLOCK<span>S</span></h1>
                <div class="hero-blocks" aria-hidden="true">
                    <span></span><span></span><span></span><span></span><span></span>
                </div>
                <p class="tagline">A classic blocks game built with plain JavaScript. Fit the pieces and clear lines.</p>

                <div class="instructions-card">
                    <h2>Instructions</h2>
                    <ul class="instructions-list">
                        <li>
                            <div class="keys"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd></div>
                            <p>Move</p>
                        </li>
                        <li>
                            <div class="keys"><kbd>Space</kbd><kbd>Q</kbd><kbd>E</kbd></div>
                            <p>Rotate</p>
                        </li>
                        <li>
                            <div class="keys"><kbd>Esc</kbd></div>
                            <p>Mute music</p>
                        </li>
                        <li>
                            <div class="keys"><kbd>★</kbd></div>
                            <p>Clear lines to score points</p>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Game -->
            <div class="game-col">
                <div class="game-layout">
                    <div class="game-container">
                        <canvas id="gameCanvas" width="300px" height="400px"></canvas>
                    </div>
                    <div class="score-controls">
                        <div class="score-bar">
                            <div class="score-item">
                                <h2>Score</h2>
                                <p id="score">0</p>
                            </div>
                            <div class="score-item">
                                <h2>Level</h2>
                                <p id="level">1</p>
                            </div>
                            <div class="score-item">
                                <h2>Lines</h2>
                                <p id="lines">0</p>
                            </div>
                        </div>
                        <div class="controls">
                            <button id="startButton">Start Game</button>
                            <button id="resetButton">Turn Off Game</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Game scripts -->
    <script src="src/js/data.js"></script>
    <script src="src/js/graphics.js"></script>
    <script src="src/js/logics.js"></script>
    <script src="src/js/blocks-data.js"></script>
    <script src="src/js/script.js"></script>
</body>
</html>
